<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litr - Link, Limit & Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <!-- 超高級オーロラ背景 -->
    <div class="background-wrapper">
        <div class="aurora"></div>
    </div>

    <div class="main-layout">
        <div class="container">
            <header>
                <div class="header-left">
                    <div class="logo-wrapper">
                        <svg width="40" height="40" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="main-logo-svg">
                            <defs>
                                <linearGradient id="g-logo" x1="0" y1="0" x2="200" y2="200">
                                    <stop offset="0%" stop-color="#6366F1"/>
                                    <stop offset="100%" stop-color="#22D3EE"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="40" fill="#0B0F1A"/>
                            <path d="M60 60 V140 H120" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M60 60 C90 40, 130 50, 140 90" stroke="url(#g-logo)" stroke-width="6" fill="none" stroke-linecap="round"/>
                            <g transform="translate(140,90)">
                                <circle r="5" fill="#22D3EE"/>
                                <circle r="10" stroke="url(#g-logo)" stroke-width="2.5" fill="none"/>
                            </g>
                            <circle cx="60" cy="60" r="5" fill="url(#g-logo)"/>
                            <circle cx="60" cy="60" r="9" stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.9"/>
                        </svg>
                        <span class="logo-text">LITR</span>
                    </div>
                    <p class="subtitle" data-i18n="subtitle">匿名・高機能・短縮URLマネージャー</p>
                </div>
                <div class="controls">
                    <button class="icon-btn" id="lang-toggle">JP</button>
                    <button class="icon-btn" id="theme-toggle">🌙</button>
                </div>
            </header>

            <!-- リンク作成フォーム -->
            <form id="link-form" class="dashboard-form">
                <div class="form-row main-row">
                    <div class="form-group">
                        <label data-i18n="url_label">転送先URL</label>
                        <input type="url" id="url" data-i18n="url_placeholder" placeholder="https://example.com" required>
                    </div>
                </div>
                
                <div class="form-row options-row">
                    <div class="form-group">
                        <label data-i18n="slug_label">カスタムスラグ</label>
                        <input type="text" id="slug" data-i18n="slug_placeholder" placeholder="my-secret-link">
                    </div>
                    <div class="form-group">
                        <label data-i18n="limit_label">アクセス上限</label>
                        <input type="number" id="limit" min="1" data-i18n="limit_placeholder" placeholder="例: 5">
                    </div>
                    <div class="form-group">
                        <label data-i18n="expiry_label">有効期限</label>
                        <input type="datetime-local" id="expiry">
                    </div>
                </div>

                <!-- Litr Ultra: 高度な設定アコーディオン -->
                <details class="advanced-details">
                    <summary data-i18n="advanced_options">高度な設定 (Ultra)</summary>
                    <div class="advanced-content">
                        <div class="form-row options-row">
                            <div class="form-group">
                                <label data-i18n="password_label">パスワード保護</label>
                                <input type="password" id="password" data-i18n="password_placeholder" placeholder="秘密の合言葉">
                            </div>
                            <div class="form-group" style="justify-content: center; align-items: flex-start;">
                                <label data-i18n="self_destruct_label">自己破壊モード</label>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="self-destruct">
                                    <label for="self-destruct"></label>
                                </div>
                            </div>
                        </div>
                        <div class="form-row options-row" style="margin-top: 1rem;">
                            <div class="form-group">
                                <label data-i18n="og_title_label">SNS用タイトル</label>
                                <input type="text" id="og-title" placeholder="Special Link">
                            </div>
                            <div class="form-group">
                                <label data-i18n="og_desc_label">SNS用説明文</label>
                                <input type="text" id="og-desc" placeholder="This link will self-destruct.">
                            </div>
                        </div>
                    </div>
                </details>
                
                <button type="submit" id="submit-btn" class="primary-btn" data-i18n="submit_btn">短縮URLを作成</button>
            </form>

            <!-- 管理パネル -->
            <div id="admin-panel" style="display: none;" class="dashboard-form">
                <h1 data-i18n="stats_title">リンク統計</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span data-i18n="clicks">クリック数</span>
                        <div id="stat-clicks" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <span data-i18n="limit">上限</span>
                        <div id="stat-limit" class="stat-value">--</div>
                    </div>
                </div>

                <div class="form-row options-row" style="margin-top: 2rem;">
                    <div class="form-group">
                        <label data-i18n="limit_label">アクセス上限を変更</label>
                        <input type="number" id="edit-limit" min="1">
                    </div>
                    <div class="form-group">
                        <label data-i18n="expiry_label">有効期限を変更</label>
                        <input type="datetime-local" id="edit-expiry">
                    </div>
                </div>
                
                <div class="admin-actions">
                    <button id="save-settings-btn" class="primary-btn" data-i18n="save_btn">設定を保存</button>
                    <button id="delete-link-btn" class="danger-btn" data-i18n="delete_btn">リンクを削除</button>
                </div>
            </div>
            
            <!-- 作成結果 -->
            <div id="result">
                <div class="result-content ultra-result">
                    <h2 data-i18n="success_title">作成完了！</h2>
                    
                    <div class="result-main-flex">
                        <div class="result-urls">
                            <div class="result-group">
                                <label>Short URL</label>
                                <div class="short-url-box">
                                    <input type="text" id="short-url-output" readonly>
                                    <button class="copy-btn" id="copy-btn" data-i18n="copy_btn">コピー</button>
                                </div>
                            </div>
                            <div class="result-group" style="margin-top: 1.5rem;">
                                <label data-i18n="admin_link_label">管理用URL</label>
                                <div class="short-url-box">
                                    <input type="text" id="admin-url-output" readonly>
                                    <button class="copy-btn" id="copy-admin-btn" data-i18n="copy_btn">コピー</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="result-qr">
                            <label data-i18n="qr_title">QRコード</label>
                            <div id="qrcode"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="error-message" class="error" style="display: none;"></div>

            <!-- クレジットセクション -->
            <footer>
                <div class="footer-content">
                    <div class="credit-group">
                        <span class="credit-label">AI Collaborators</span>
                        <div class="credit-names">
                            <span>Gemini</span>
                            <span>Gemini CLI</span>
                            <span>ChatGPT</span>
                        </div>
                    </div>
                    <div class="credit-group">
                        <span class="credit-label">Tech Stack</span>
                        <div class="tech-tags">
                            <span class="tech-tag">Vanilla JS</span>
                            <span class="tech-tag">Supabase</span>
                            <span class="tech-tag">GitHub Pages</span>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
